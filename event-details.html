<!-- event-details.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Details - Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f8f8f8;
        }

        .sidebar-link {
            display: block;
            padding: 12px 16px;
            border-radius: 12px;
            transition: .3s;
            font-weight: 500;
        }

        .sidebar-link:hover {
            background: #facc15;
            color: #000;
        }

        .active-link {
            background: #facc15;
            color: #000;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .05);
        }

        .badge {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-open {
            background: #dcfce7;
            color: #166534;
        }

        .badge-ended {
            background: #fee2e2;
            color: #991b1b;
        }

        .table-row {
            border-bottom: 1px solid #eee;
        }

        .table-row:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>

    <div class="flex min-h-screen">

        <!-- layout.js injects sidebar -->

        <main class="flex-1">

            <!-- Header -->
            <header class="bg-white px-6 md:px-10 py-5 shadow-sm">
                <h2 class="text-2xl font-bold">Event Details</h2>
                <p class="text-sm text-gray-500">
                    View event information and registered workers
                </p>
            </header>

            <!-- Content -->
            <section class=" space-y-8">

                <!-- Loader -->
                <div id="loader" class="card text-center py-16">
                    <p class="text-lg font-semibold">Loading event...</p>
                </div>

                <!-- Event -->
                <div id="event-wrapper" class="hidden space-y-8">

                    <!-- Top -->
                    <div class="card p-0 overflow-hidden">
                        <img id="event-image" alt="event image" class="w-full h-72 object-cover">

                        <div class="p-6">
                            <div class="flex justify-between gap-4 flex-wrap items-start">
                                <div>
                                    <h3 id="event-name" class="text-3xl font-bold"></h3>
                                    <p id="event-location" class="text-gray-500 mt-2"></p>
                                    <p id="event-date" class="text-gray-500"></p>
                                </div>

                                <div id="event-status"></div>
                            </div>

                            <p id="event-description" class="mt-6 text-gray-700 leading-7"></p>
                        </div>
                    </div>

                    <!-- Stats -->
                    <div class="grid md:grid-cols-3 gap-6">

                        <div class="card text-center">
                            <p class="text-gray-500">Total Registered</p>
                            <h3 id="total-workers" class="text-4xl font-bold mt-2">0</h3>
                        </div>

                        <div class="card text-center">
                            <p class="text-gray-500">Male / Female</p>
                            <h3 class="text-2xl font-bold mt-2">N/A</h3>
                        </div>

                        <div class="card text-center">
                            <p class="text-gray-500">Status</p>
                            <h3 id="mini-status" class="text-2xl font-bold mt-2">Upcoming</h3>
                        </div>

                    </div>

                    <!-- Registered Workers -->
                    <div class="card">

                        <div class="flex justify-between items-center flex-wrap gap-4 mb-6">
                            <h3 class="text-xl font-bold">Registered Workers</h3>

                            <a href="event-man.html"
                                class="px-5 py-2 rounded-xl bg-black text-white font-semibold">
                                Back
                            </a>
                        </div>

                        <div class="overflow-x-auto">
                            <table class="w-full text-left">

                                <thead>
                                    <tr class="border-b">
                                        <th class="py-3">Worker ID</th>
                                        <th class="py-3">Full Name</th>
                                        <th class="py-3">Phone</th>
                                        <th class="py-3">LGA</th>
                                        <th class="py-3">Ward</th>
                                    </tr>
                                </thead>

                                <tbody id="workers-body"></tbody>

                            </table>
                        </div>

                    </div>

                </div>

                <!-- Error -->
                <div id="error-box" class="hidden card text-center py-16">
                    <h3 class="text-2xl font-bold text-red-500">Failed to load event</h3>
                    <p class="text-gray-500 mt-2">Please try again later.</p>
                </div>

            </section>

        </main>

    </div>

    <!-- IMPORTANT -->
    <script src="js/layout.js"></script>
    <script src="js/api.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {

            const params = new URLSearchParams(window.location.search);
            const eventId = params.get("id");

            const loader = document.getElementById("loader");
            const wrapper = document.getElementById("event-wrapper");
            const errorBox = document.getElementById("error-box");

            if (!eventId) {
                loader.classList.add("hidden");
                errorBox.classList.remove("hidden");
                return;
            }

            try {
                const event = await api.get(`/admin/events/${eventId}/registrations`);

                loader.classList.add("hidden");
                wrapper.classList.remove("hidden");

                const eventDate = new Date(event.date);
                const today = new Date();
                today.setHours(0, 0, 0, 0);

                const ended = eventDate < today;

                document.getElementById("event-image").src = event.image_url || "";
                document.getElementById("event-name").textContent = event.name;
                document.getElementById("event-location").textContent = event.location;
                document.getElementById("event-date").textContent =
                    eventDate.toLocaleDateString("en-US", {
                        year: "numeric",
                        month: "long",
                        day: "numeric"
                    });

                document.getElementById("event-description").textContent =
                    event.description;

                document.getElementById("event-status").innerHTML =
                    ended
                        ? `<span class="badge badge-ended">Ended</span>`
                        : `<span class="badge badge-open">Upcoming</span>`;

                document.getElementById("mini-status").textContent =
                    ended ? "Ended" : "Upcoming";

                const workers = event.registered_workers || [];

                document.getElementById("total-workers").textContent =
                    workers.length;

                const tbody = document.getElementById("workers-body");

                if (workers.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" class="py-8 text-center text-gray-500">
                                No workers registered yet
                            </td>
                        </tr>
                    `;
                } else {
                    workers.forEach(worker => {
                        tbody.innerHTML += `
                            <tr class="table-row">
                                <td class="py-4">${worker.worker_id || "-"}</td>
                                <td class="py-4">${worker.full_name || "-"}</td>
                                <td class="py-4">${worker.phone_number || "-"}</td>
                                <td class="py-4">${worker.lga || "-"}</td>
                                <td class="py-4">${worker.ward || "-"}</td>
                            </tr>
                        `;
                    });
                }

            } catch (error) {
                console.error(error);
                loader.classList.add("hidden");
                errorBox.classList.remove("hidden");
            }

        });
    </script>

</body>

</html>
