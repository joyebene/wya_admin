<!-- settings.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f8f8f8;
        }

        .sidebar-link {
            display: block;
            padding: 12px 16px;
            border-radius: 12px;
            transition: .3s;
            font-weight: 500;
        }

        .sidebar-link:hover {
            background: #facc15;
            color: #000;
        }

        .active-link {
            background: #facc15;
            color: #000;
        }

        .card {
            background: #fff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .05);
        }

        .input {
            width: 100%;
            border: 1px solid #e5e7eb;
            padding: 12px 14px;
            border-radius: 12px;
            outline: none;
        }

        .input:focus {
            border-color: #facc15;
        }

        .btn {
            padding: 12px 18px;
            border-radius: 12px;
            font-weight: 600;
            transition: .3s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .toggle {
            width: 52px;
            height: 28px;
            background: #e5e7eb;
            border-radius: 999px;
            position: relative;
            cursor: pointer;
        }

        .toggle::after {
            content: '';
            width: 22px;
            height: 22px;
            background: white;
            position: absolute;
            top: 3px;
            left: 3px;
            border-radius: 50%;
            transition: .3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .15);
        }

        .toggle.active {
            background: #facc15;
        }

        .toggle.active::after {
            left: 27px;
        }
    </style>
</head>

<body>

    <div class="flex min-h-screen">

        <main class="flex-1">

            <!-- Header -->
            <header class="bg-white px-6 md:px-10 py-5 shadow-sm">

                <h2 class="text-2xl font-bold">Settings</h2>
                <p class="text-sm text-gray-500">
                    Manage admin profile and website configuration
                </p>

            </header>

            <!-- Content -->
            <section class="py-6 md:py-10 space-y-8">

                <!-- Admin Profile -->
                <div class="card">

                    <h3 class="text-xl font-bold mb-6">Admin Profile</h3>

                    <div class="grid md:grid-cols-2 gap-5">

                        <div>
                            <label class="text-sm font-medium">Full Name</label>
                            <input id="admin-name" title="Admin name" type="text" value="Super Admin"
                                class="input mt-2">
                        </div>

                        <div>
                            <label class="text-sm font-medium">Email Address</label>
                            <input id="admin-email" title="Admin email" type="email" value="admin@email.com"
                                class="input mt-2">
                        </div>

                        <div>
                            <label class="text-sm font-medium">Phone Number</label>
                            <input id="admin-phone" title="Admin phone" type="text" value="+2348000000000"
                                class="input mt-2">
                        </div>

                        <!-- <div>
                        <label class="text-sm font-medium">Profile Image</label>
                        <input type="file"
                            class="input mt-2">
                    </div> -->

                    </div>

                    <button id="save-profile-btn"
                        class="mt-6 bg-yellow-400 px-6 py-3 rounded-xl font-semibold hover:bg-yellow-300">
                        Save Profile
                    </button>

                </div>

                <!-- Change Password -->
                <div class="card">

                    <h3 class="text-xl font-bold mb-6">Change Password</h3>

                    <div class="grid md:grid-cols-2 gap-5">

                        <input id="current-password" type="password" placeholder="Current Password" class="input">

                        <input id="new-password" type="password" placeholder="New Password" class="input">

                        <input id="confirm-password" type="password" placeholder="Confirm Password" class="input">

                    </div>

                    <button class="mt-6 bg-black text-white px-6 py-3 rounded-xl font-semibold hover:bg-gray-800">
                        Update Password
                    </button>

                </div>

                <!-- Create New Admin -->
                <div class="card">

                    <h3 class="text-xl font-bold mb-6">Create New Admin</h3>

                    <div class="grid md:grid-cols-2 gap-5">

                        <input type="email" placeholder="New Admin Email" class="input" id="new-admin-email">

                        <input type="password" placeholder="New Admin Password" class="input" id="new-admin-password">

                    </div>

                    <button class="mt-6 bg-black text-white px-6 py-3 rounded-xl font-semibold hover:bg-gray-800"
                        id="create-admin-btn">
                        Create Admin
                    </button>

                </div>

                <!-- Website Settings -->
                <div class="card">

                    <h3 class="text-xl font-bold mb-6">Website Settings</h3>

                    <div class="grid md:grid-cols-2 gap-5">

                        <div>
                            <label class="text-sm font-medium">Website Title</label>
                            <input id="site-title" title="Website title" type="text" value="Wadada Youth Ambassadors"
                                class="input mt-2">
                        </div>

                        <div>
                            <label class="text-sm font-medium">Contact Email</label>
                            <input id="site-email" title="Contact email" type="email" value="info@wadada.org"
                                class="input mt-2">
                        </div>

                        <div>
                            <label class="text-sm font-medium">Phone</label>
                            <input id="site-phone" title="Contact phone" type="text" value="+234 xxx xxx xxxx"
                                class="input mt-2">
                        </div>

                        <div>
                            <label class="text-sm font-medium">Address</label>
                            <input id="site-address" title="Contact address" type="text" value="Nasarawa State, Nigeria"
                                class="input mt-2">
                        </div>

                    </div>

                    <button id="save-settings-btn"
                        class="mt-6 bg-yellow-400 px-6 py-3 rounded-xl font-semibold hover:bg-yellow-300">
                        Save Website Info
                    </button>

                </div>

            </section>

        </main>

    </div>

    <script src="js/layout.js"></script>
    <script src="js/api.js"></script>
    <script src="js/settings.js"></script>

</body>

</html>
