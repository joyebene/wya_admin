<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Details - Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f8f8f8;
        }

        .sidebar-link {
            display: block;
            padding: 12px 16px;
            border-radius: 12px;
            transition: .3s;
            font-weight: 500;
        }

        .sidebar-link:hover {
            background: #facc15;
            color: #000;
        }

        .active-link {
            background: #facc15;
            color: #000;
        }

        .card {
            background: #fff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .05);
        }
    </style>
</head>

<body>

    <div class="flex min-h-screen">

        <!-- Header -->
        <header class="bg-white px-6 md:px-10 py-5 shadow-sm">
            <a href="members.html" class="text-sm text-blue-500 hover:underline mb-2 inline-block">&larr; Back to All Members</a>
            <h2 class="text-2xl font-bold">Member Details</h2>
            <p class="text-sm text-gray-500">
                Detailed information for a registered member.
            </p>
        </header>

        <!-- Content: Details will be loaded here -->
        <section id="details-content" class="p-6 md:p-10">
            <!-- Loading state -->
            <p>Loading member details...</p>
        </section>

    </div>

    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const detailsContent = document.getElementById('details-content');
            
            // Get member ID from URL query parameter
            const urlParams = new URLSearchParams(window.location.search);
            const memberId = urlParams.get('id');

            if (!memberId) {
                detailsContent.innerHTML = `<p class="text-red-500">No member ID provided.</p>`;
                return;
            }

            try {
                const member = await api.get(`/admin/users/${memberId}`);
                
                const dateJoined = new Date(member.created_at).toLocaleString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                detailsContent.innerHTML = `
                    <div class="card max-w-2xl">
                        <div class="space-y-4">
                            <div>
                                <h3 class="text-sm text-gray-500">Full Name</h3>
                                <p class="text-lg font-semibold">${member.full_name}</p>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <h3 class="text-sm text-gray-500">Email Address</h3>
                                    <p class="text-lg">${member.email}</p>
                                </div>
                                <div>
                                    <h3 class="text-sm text-gray-500">Phone Number</h3>
                                    <p class="text-lg">${member.phone_number}</p>
                                </div>
                            </div>
                             <div>
                                <h3 class="text-sm text-gray-500">Address</h3>
                                <p class="text-lg">${member.address}</p>
                            </div>
                            <div>
                                <h3 class="text-sm text-gray-500">Date Joined</h3>
                                <p class="text-lg">${dateJoined}</p>
                            </div>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('Failed to fetch member details:', error);
                detailsContent.innerHTML = `<p class="text-red-500">Failed to load member details. The member may not exist.</p>`;
            }
        });
    </script>

</body>

</html>
