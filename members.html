<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Members - Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f8f8f8;
        }

        .sidebar-link {
            display: block;
            padding: 12px 16px;
            border-radius: 12px;
            transition: .3s;
            font-weight: 500;
        }

        .sidebar-link:hover {
            background: #facc15;
            color: #000;
        }

        .active-link {
            background: #facc15;
            color: #000;
        }

        .card {
            background: #fff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .05);
        }
    </style>
</head>

<body>

    <div class="flex min-h-screen">

        <!-- Header -->
        <header class="bg-white px-6 md:px-10 py-5 shadow-sm">

            <h2 class="text-2xl font-bold">All Members</h2>
            <p class="text-sm text-gray-500">
                View, search, and manage all registered members
            </p>

        </header>

        <!-- Content -->
        <section class="py-6 md:py-10">

            <!-- Search Bar -->
            <div class="mb-6">
                <input type="text" id="search-input" placeholder="Search by name, email, or member ID..."
                    class="w-full md:w-2/3 p-3 border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-yellow-500">
            </div>

            <div class="card">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b">
                                <th class="p-3 text-left">S/N</th>
                                <th class="p-3 text-left">Memeber ID</th>
                                <th class="p-3 text-left">Full Name</th>
                                <th class="p-3 text-left">Email</th>
                                <th class="p-3 text-left">Phone</th>
                                <th class="p-3 text-left">Date Joined</th>
                                <th class="p-3 text-left">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="members-table-body">
                            <!-- Member rows will be inserted here by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>

        </section>

    </div>

    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tableBody = document.getElementById('members-table-body');
            const searchInput = document.getElementById('search-input');

            // A simple debounce function to prevent API calls on every keystroke
            const debounce = (func, delay) => {
                let timeout;
                return (...args) => {
                    clearTimeout(timeout);
                    timeout = setTimeout(() => func.apply(this, args), delay);
                };
            };

            const renderMembers = (members) => {
                let tableContent = '';
                if (members.length === 0) {
                    tableContent = `
                        <tr>
                            <td colspan="7" class="text-center p-6 text-gray-500">
                                No members found.
                            </td>
                        </tr>
                    `;
                } else {
                    members.forEach((member, index) => {
                        const dateJoined = new Date(member.created_at).toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric'
                        });

                        tableContent += `
                            <tr class="border-b">
                                <td class="p-3">${index + 1}</td>
                                <td class="p-3">${member.worker_id}</td>
                                <td class="p-3">${member.full_name}</td>
                                <td class="p-3">${member.email}</td>
                                <td class="p-3">${member.phone_number}</td>
                                <td class="p-3">${dateJoined}</td>
                                <td class="p-3">
                                    <a href="member-details.html?id=${member.id}" class="text-green-500 hover:underline">View</a>
                                </td>
                            </tr>
                        `;
                    });
                }
                tableBody.innerHTML = tableContent;
            };

            const loadMembers = async (query = '') => {
                try {
                    const endpoint = query ? `/admin/users?search=${encodeURIComponent(query)}` : '/admin/users';
                    const members = await api.get(endpoint);
                    renderMembers(members);
                } catch (error) {
                    console.error('Failed to load members:', error);
                    tableBody.innerHTML = `
                        <tr>
                            <td colspan="7" class="text-center p-6 text-red-500">
                                Failed to load members. Please try again later.
                            </td>
                        </tr>
                    `;
                }
            };

            // Debounced version of loadMembers for the search input
            const debouncedLoad = debounce(loadMembers, 300);

            searchInput.addEventListener('input', (e) => {
                debouncedLoad(e.target.value);
            });

            // Initial load of all members
            loadMembers();
        });
    </script>

</body>

</html>
